# OpenTelemetry Collector configuration
#
# Pipelines:
#   traces  — receives OTLP traces from instrumented services → VictoriaTraces
#   logs    — receives OTLP logs from instrumented services  → VictoriaLogs

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 10

exporters:
  debug:
    verbosity: detailed

  otlphttp/victorialogs:
    endpoint: http://victorialogs:9428/insert/opentelemetry
    tls:
      insecure: true

  otlphttp/victoriatraces:
    endpoint: http://victoriatraces:8428/insert/opentelemetry
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlphttp/victoriatraces]
    logs:
      receivers: [otlp]
      exporters: [otlphttp/victorialogs]
