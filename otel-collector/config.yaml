# OpenTelemetry Collector configuration
#
# Pipelines:
#   traces  — receives OTLP traces from instrumented services → VictoriaTraces
#   logs    — receives OTLP logs from instrumented services  → VictoriaLogs

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  debug:
    verbosity: detailed

  otlp_http/victorialogs:
    endpoint: http://victorialogs:9428/insert/opentelemetry
    tls:
      insecure: true

  otlp_http/victoriatraces:
    endpoint: http://victoriatraces:10428/insert/opentelemetry
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/victoriatraces]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/victorialogs, debug]
